version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: massage-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: massage_app
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - db_data:/var/lib/mysql

  web:
    build: .
    container_name: massage-web
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      APP_URL: http://localhost
      DEFAULT_LOCALE: de
      DATABASE_URL: mysql://appuser:apppassword@mysql:3306/massage_app
      SESSION_SECRET: change_me_to_a_long_random_secret
      SMTP_HOST: smtp.example.com
      SMTP_PORT: 587
      SMTP_SECURE: "false"
      SMTP_USERNAME: user@example.com
      SMTP_PASSWORD: password
      SMTP_FROM: no-reply@example.com
      UPLOAD_DIR: /app/public/uploads
    ports:
      - "3002:3000"
    volumes:
      - uploads_data:/app/public/uploads

  nginx:
    image: nginx:alpine
    container_name: massage-nginx
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  db_data:
  uploads_data:
