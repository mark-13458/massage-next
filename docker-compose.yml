services:
  mysql:
    image: mysql:8.0
    container_name: massage-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-massage_app}
      MYSQL_USER: ${MYSQL_USER:-appuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-apppassword}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - db_data:/var/lib/mysql

  web:
    build: .
    container_name: massage-web
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      APP_URL: ${APP_URL:-http://localhost}
      DEFAULT_LOCALE: ${DEFAULT_LOCALE:-de}
      DATABASE_URL: ${DATABASE_URL:-mysql://appuser:apppassword@mysql:3306/massage_app}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-ChangeMe123!}
      ADMIN_NAME: ${ADMIN_NAME:-Admin}
      SESSION_SECRET: ${SESSION_SECRET:-change_me_to_a_long_random_secret}
      SMTP_HOST: ${SMTP_HOST:-smtp.example.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USERNAME: ${SMTP_USERNAME:-user@example.com}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-password}
      SMTP_FROM: ${SMTP_FROM:-no-reply@example.com}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/public/uploads}
    ports:
      - "${APP_PORT:-3002}:3000"
    volumes:
      - uploads_data:/app/public/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  nginx:
    image: nginx:alpine
    container_name: massage-nginx
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  db_data:
  uploads_data:
